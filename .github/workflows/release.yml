name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc-mingw-w64 zip

      - name: Build Linux plugin
        working-directory: wfx
        run: make dist-linux

      - name: Build Windows plugin
        working-directory: wfx
        run: make dist-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/crosspoint-usb-wfx-linux-x86_64.zip
            dist/crosspoint-usb-wfx-windows.zip
