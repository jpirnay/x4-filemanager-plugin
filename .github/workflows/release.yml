name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc-mingw-w64 zip

      - name: Build Linux plugin
        working-directory: wfx
        run: make dist-linux

      - name: Build Windows plugin
        working-directory: wfx
        run: make dist-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            dist/crosspoint-usb-wfx-linux-x86_64.zip
            dist/crosspoint-usb-wfx-windows.zip
